<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYEDGE PRO</title>
    <!-- FAVICON DATA URI -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a1214%22/><text y=%22.9em%22 font-size=%2290%22 fill=%22white%22>P</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-node">
        <div class="brand-sector">
            <!-- ABSOLUTE LOGO FIX (NO FALLBACKS, PURE BRANDING) -->
            <div class="brand-icon-wrapper" style="background: white; border-radius: 4px; padding: 2px;">
                <svg width="22" height="22" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- PRECISE P WITH LIGHTNING GEOMETRY -->
                    <path d="M35 15H75C85 15 95 20 95 40C95 60 85 65 75 65H55L45 85L60 65H35L50 40H45L35 15Z" fill="black"/>
                </svg>
            </div>
            <span class="brand-name">POLYEDGE</span>
        </div>
        <nav class="nav-sector">
            <!-- NAV ITEMS (Logic handled by app.js correctly now) -->
            <div class="nav-item active">TERMINAL</div>
            <div class="nav-item">TRADE</div>
            <div class="nav-item">STATS</div>
            <div class="nav-item">COPY</div>
            <div class="nav-item">LIGHTNING</div>
        </nav>
        <div class="action-sector">
            <button class="connect-btn">CONNECT</button>
        </div>
    </header>

    <section class="stats-bar">
        <div class="stat-box">
            <span class="stat-label">MARKETS TRACKED</span>
            <span class="stat-val" id="market-count">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">24h ALPHA FLOW</span>
            <span class="stat-val" id="flow-val">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">NETWORK NODE</span>
            <span class="stat-val active-val">polyedgeapp.xyz</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">LATENCY</span>
            <span class="stat-val active-val">1ms</span>
        </div>
    </section>

    <div class="search-sector">
        <input type="text" class="search-input" id="shardSearch" placeholder="Search Markets / Shards / Events...">
    </div>

    <main class="market-list" id="shard-grid">
        <div class="empty-state" id="boot-loader">ESTABLISHING SECURE PROTOCOL LINK...</div>
    </main>

    <script src="app.js?v=6.0"></script>
</body>
</html>
