<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge — Modern Prediction Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrap">
        <!-- TOP NAVIGATION -->
        <header class="navbar">
            <div class="nav-left">
                <div class="brand clickable" id="home-link">
                    <div class="brand-logo">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h11a6.5 6.5 0 0 1 0 13h-3v5L2 11h6V7z M12 7h3a2.5 2.5 0 0 1 0 5h-3z"/></svg>
                    </div>
                    <span class="brand-name">PolyEdge</span>
                </div>
                <nav class="nav-links">
                    <a href="#" class="nav-link active" data-tab="markets">Markets</a>
                    <a href="#" class="nav-link" data-tab="watchlist">Watchlist</a>
                    <a href="#" class="nav-link" data-tab="scanner">Scanner</a>
                    <a href="#" class="nav-link" data-tab="arbitrage">Arbitrage</a>
                    <a href="#" class="nav-link" data-tab="simulator">Simulator</a>
                </nav>
            </div>
            <div class="nav-right">
                <div class="nav-icon-btn">
                     <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </div>
                <div class="circular-timer">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        <path class="circle" stroke-dasharray="75, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    </svg>
                    <span class="timer-text">2s</span>
                </div>
                <button class="theme-btn" id="theme-toggle">
                    <svg class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <div class="world-clocks">
                    <div class="clock">NYC <b>08:36</b></div>
                    <div class="clock">LDN <b>12:36</b></div>
                    <div class="clock">TKO <b>21:36</b></div>
                </div>
            </div>
        </header>

        <!-- MAIN DASHBOARD -->
        <main class="dashboard-container">
            <!-- SUMMARY STATS -->
            <div class="stat-summary">
                <div class="stat-item">
                    <span class="stat-val" id="markets-count">60</span>
                    <span class="stat-label">Markets</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-val" id="total-vol">$79.5M</span>
                    <span class="stat-label">24h Volume</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-val" id="opps-count">52</span>
                    <span class="stat-label">Opportunities</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-val" id="best-roi">2000x</span>
                    <span class="stat-label">Best ROI</span>
                </div>
            </div>

            <!-- TRENDING MARKETS SECTION -->
            <section class="markets-section">
                <div class="section-header">
                    <h2 class="section-title">Trending Markets</h2>
                    <div class="search-wrap">
                         <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                         <input type="text" placeholder="Search markets..." id="market-search">
                    </div>
                    <div class="header-filters">
                        <select class="filter-dropdown"><option>All</option></select>
                        <select class="filter-dropdown"><option>Any Volume</option></select>
                        <select class="filter-dropdown"><option>Volume 24h</option></select>
                    </div>
                </div>

                <!-- GRID OF CARDS -->
                <div class="card-grid" id="markets-grid">
                    <!-- Cards will be rendered by JS -->
                </div>
                
                <div class="load-more-wrap">
                    <button class="btn-primary-outline" id="load-more">Load more markets</button>
                </div>
            </section>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="app.js"></script>
</body>
</html>
