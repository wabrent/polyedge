<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge | Polymarket Analytics Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <header class="header">
            <a href="#" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L1 12l11 10 11-10L12 2zm0 18.5L3.5 12 12 5.5 20.5 12 12 20.5z"/>
                </svg>
                PolyEdge
            </a>
            <nav class="nav">
                <a href="#markets" class="nav-link active">Markets</a>
                <a href="#whale" class="nav-link">Whale Analyzer</a>
                <a href="#tracker" class="nav-link">Portfolio</a>
            </nav>
            <div class="header-actions">
                <button class="btn btn-primary">Connect Wallet</button>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="main-layout">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div style="margin-bottom: 32px;">
                    <h3 style="font-size: 12px; color: var(--pm-text-secondary); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.05em;">Categories</h3>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <button class="btn btn-outline" style="justify-content: flex-start; width: 100%;" onclick="loadMarkets('politics')">🇺🇸 Politics</button>
                        <button class="btn btn-outline" style="justify-content: flex-grow; justify-content: flex-start; width: 100%;" onclick="loadMarkets('crypto')">₿ Crypto</button>
                        <button class="btn btn-outline" style="justify-content: flex-start; width: 100%;" onclick="loadMarkets('sports')">🏀 Sports</button>
                    </div>
                </div>

                <div>
                    <h3 style="font-size: 12px; color: var(--pm-text-secondary); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.05em;">Live Stats</h3>
                    <div class="panel" style="background: var(--pm-panel); padding: 16px; border-radius: 8px; border: 1px solid var(--pm-border);">
                        <div style="margin-bottom: 12px;">
                            <p style="font-size: 11px; color: var(--pm-text-secondary);">24h Volume</p>
                            <p style="font-size: 18px; font-weight: 800;">$142.5M</p>
                        </div>
                        <div>
                            <p style="font-size: 11px; color: var(--pm-text-secondary);">Active Markets</p>
                            <p style="font-size: 18px; font-weight: 800;">2,410</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- CONTENT -->
            <main class="main-content">
                <!-- TOP BAR -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                    <div>
                        <h1 style="font-size: 28px; font-weight: 800;">Real-time Markets</h1>
                        <p style="color: var(--pm-text-secondary); font-size: 14px;">Live data stream from Polymarket Gamma Protocol</p>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="marketSearch" placeholder="Search markets..." style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--pm-border); outline: none; width: 300px;">
                    </div>
                </div>

                <!-- MARKET LIST -->
                <div class="market-grid" id="marketGrid">
                    <!-- SKELETONS -->
                    <div class="market-card"><div class="skeleton" style="height: 24px; width: 80%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 16px; width: 40%;"></div></div>
                    <div class="market-card"><div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 16px; width: 30%;"></div></div>
                    <div class="market-card"><div class="skeleton" style="height: 24px; width: 90%; margin-bottom: 16px;"></div><div class="skeleton" style="height: 16px; width: 50%;"></div></div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL (FOR WHALE ANALYZER OR MARKET DETAILS) -->
    <div id="modalOverlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 16px; width: 100%; max-width: 600px; padding: 32px; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
            <button onclick="closeModal()" style="position: absolute; top: 20px; right: 20px; border: none; background: none; font-size: 20px; cursor: pointer;">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
