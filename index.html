<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYEDGE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-node">
        <div class="brand-sector">
            <div class="brand-icon">
                <!-- EXACT REPLICA OF THE ICON FROM polyedgeapp.xyz -->
                <svg class="icon-p" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="25" y="25" width="15" height="50" fill="black"/>
                    <path d="M40 25L80 50L40 75Z" fill="black"/>
                </svg>
            </div>
            <span class="brand-name">POLYEDGE</span>
        </div>
        <nav class="nav-sector">
            <div class="nav-item active" onclick="navSwitch(this)">TERMINAL</div>
            <div class="nav-item" onclick="navSwitch(this)">TRADE</div>
            <div class="nav-item" onclick="navSwitch(this)">STATS</div>
            <div class="nav-item" onclick="navSwitch(this)">COPY</div>
            <div class="nav-item" onclick="navSwitch(this)">LIGHTNING</div>
        </nav>
        <div class="action-sector">
            <button class="connect-btn">CONNECT</button>
        </div>
    </header>

    <section class="stats-bar">
        <div class="stat-box">
            <span class="stat-label">MARKETS TRACKED</span>
            <span class="stat-val" id="market-count">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">24h ALPHA FLOW</span>
            <span class="stat-val" id="flow-val">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">NETWORK NODE</span>
            <span class="stat-val active-val">polyedgeapp.xyz</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">LATENCY</span>
            <span class="stat-val active-val">2ms</span>
        </div>
    </section>

    <div class="search-sector">
        <input type="text" class="search-input" id="shardSearch" placeholder="Search Markets / Shards / Events...">
    </div>

    <main class="market-list" id="shard-grid">
        <!-- Dashboard content will load here -->
        <div class="empty-state" id="boot-loader">INITIALIZING SECURE NODE SHARD...</div>
    </main>

    <script src="app.js"></script>
    <script>
        function navSwitch(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
