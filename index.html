<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLYEDGE PRO | Live Intelligence</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header-node">
        <div class="brand-sector">
            <!-- RECONSTRUCTED POLYEDGE PRO LOGO (P WITH LIGHTNING) -->
            <div class="brand-icon" style="background: white; width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                <svg width="16" height="16" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 20H75C85 20 95 25 95 45C95 65 85 70 75 70H55L45 90L60 70H40L55 45H50L40 20Z" fill="black"/>
                </svg>
            </div>
            <span class="brand-name">POLYEDGE</span>
        </div>
        <nav class="nav-sector">
            <div class="nav-item active">TERMINAL</div>
            <div class="nav-item">TRADE</div>
            <div class="nav-item">STATS</div>
            <div class="nav-item">COPY</div>
            <div class="nav-item">LIGHTNING</div>
        </nav>
        <div class="action-sector">
            <button class="connect-btn">CONNECT</button>
        </div>
    </header>

    <section class="stats-bar">
        <div class="stat-box">
            <span class="stat-label">MARKETS TRACKED</span>
            <span class="stat-val" id="market-count">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">24h ALPHA FLOW</span>
            <span class="stat-val" id="flow-val">--</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">NETWORK NODE</span>
            <span class="stat-val active-val">polyedgeapp.xyz</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">LATENCY</span>
            <span class="stat-val active-val">1ms</span>
        </div>
    </section>

    <div class="search-sector">
        <input type="text" class="search-input" id="shardSearch" placeholder="Search Markets / Shards / Events...">
    </div>

    <main class="market-list" id="shard-grid">
        <div class="empty-state" id="boot-loader">ESTABLISHING CONNECTION TO SHARD NODES...</div>
    </main>

    <script src="app.js"></script>
</body>
</html>
