<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge — Global Intelligence Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- TOP NAVIGATION BAR -->
        <header class="navbar">
            <div class="nav-container">
                <div class="nav-left">
                    <div class="brand clickable" id="logo-main">
                        <div class="logo-box">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M4 3h11a6.5 6.5 0 0 1 0 13h-3v5L2 11h6V7z M12 7h3a2.5 2.5 0 0 1 0 5h-3z"/>
                            </svg>
                        </div>
                        <span class="brand-text">PolyEdge</span>
                    </div>
                    <nav class="nav-tabs">
                        <a href="#" class="tab-link active" data-tab="markets">Markets</a>
                        <a href="#" class="tab-link" data-tab="watchlist">Watchlist</a>
                        <a href="#" class="tab-link" data-tab="scanner">Scanner</a>
                        <a href="#" class="tab-link" data-tab="arbitrage">Arbitrage</a>
                        <a href="#" class="tab-link" data-tab="simulator">Simulator</a>
                    </nav>
                </div>

                <div class="nav-right">
                    <div class="utility-icons">
                        <button class="icon-btn clickable">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                        <div class="timer-widget">
                            <svg class="timer-svg" viewBox="0 0 36 36">
                                <circle class="timer-bg" cx="18" cy="18" r="15.915"></circle>
                                <circle class="timer-bar" cx="18" cy="18" r="15.915"></circle>
                            </svg>
                            <span class="timer-val">2s</span>
                        </div>
                        <button class="theme-btn clickable" id="theme-toggle">
                            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        </button>
                    </div>
                    <div class="clock-display">
                        <div class="clock-item">NYC <b id="nyc-time">08:36</b></div>
                        <div class="clock-item">LDN <b id="ldn-time">12:36</b></div>
                        <div class="clock-item">TKO <b id="tko-time">21:36</b></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <main class="main-dashboard">
            <!-- BIG SUMMARY CARDS -->
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-num" id="stat-markets">60</span>
                    <span class="stat-label">Markets</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-volume">$79.5M</span>
                    <span class="stat-label">24h Volume</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-opps">52</span>
                    <span class="stat-label">Opportunities</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-roi">2000x</span>
                    <span class="stat-label">Best ROI</span>
                </div>
            </div>

            <!-- SEARCH & FILTER BAR -->
            <div class="search-section">
                <h2 class="page-title">Trending Markets</h2>
                <div class="search-bar">
                    <svg class="search-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" placeholder="Search markets..." id="market-input">
                </div>
                <div class="filter-controls">
                    <select class="filter-dropdown clickable"><option>All</option></select>
                    <select class="filter-dropdown clickable"><option>Any Volume</option></select>
                    <select class="filter-dropdown clickable"><option>Volume 24h</option></select>
                </div>
            </div>

            <!-- MARKET CARDS GRID -->
            <div class="markets-grid" id="markets-container">
                <!-- Cards injected via JS -->
            </div>

            <div class="load-more-wrap">
                <button class="btn-outline clickable" id="load-btn">Load more markets</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
