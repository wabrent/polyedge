<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge — Shard Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container" style="max-width:1400px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; padding: 12px 24px;">
            <div class="logo-group" style="display:flex; align-items:center; gap:24px;">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>PolyEdge</span>
                </div>
                <nav class="main-nav" style="display:flex; gap:16px;">
                    <button class="nav-item active" data-tab="dashboard">Markets</button>
                    <button class="nav-item" data-tab="watchlist">Watchlist</button>
                </nav>
            </div>
            
            <div class="header-right" style="display:flex; align-items:center; gap:20px;">
                <div class="refresh-timer" id="refresh-timer" style="display:flex; align-items:center; gap:8px; font-size:0.75rem; color:var(--text-3);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    <span id="refresh-text">60s</span>
                </div>
                <button class="theme-toggle" id="theme-toggle">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <div class="clocks" style="display:flex; gap:12px; font-size:0.7rem; font-weight:700;">
                    <div>NYC <span id="clock-nyc">00:00</span></div>
                    <div>LDN <span id="clock-ldn">00:00</span></div>
                    <div>TKO <span id="clock-tko">00:00</span></div>
                </div>
            </div>
        </div>
    </header>

    <main style="padding: 24px; max-width: 1400px; margin: 0 auto;">
        <!-- ===== MARKETS TAB ===== -->
        <section class="tab active shard-layout" id="tab-dashboard" style="display: flex; gap: 32px;">
            <aside class="shard-sidebar" style="width: 220px; flex-shrink: 0;">
                <div class="sidebar-section">
                    <div class="sidebar-title">SORT</div>
                    <div class="sidebar-grid">
                        <button class="shard-btn active" data-sort="volume24hr">24h Vol</button>
                        <button class="shard-btn" data-sort="volume">Total Vol</button>
                        <button class="shard-btn" data-sort="liquidity">Liquidity</button>
                        <button class="shard-btn" data-sort="spread">Spread</button>
                        <button class="shard-btn" data-sort="ending">End Date</button>
                        <button class="shard-btn" data-sort="potential">Rewards</button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">FILTER PRESETS</div>
                    <div class="sidebar-list">
                        <button class="shard-list-btn active" data-filter="all">All Markets</button>
                        <button class="shard-list-btn" data-filter="high_vol">High Volume</button>
                        <button class="shard-list-btn" data-filter="high_liq">High Liquidity</button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">TERMINAL METRICS</div>
                    <div class="shard-stats">
                        <div class="shard-stat-item">
                            <span class="shard-stat-val" id="stat-total-markets">...</span>
                            <span class="shard-stat-lbl">MARKETS</span>
                        </div>
                        <div class="shard-stat-item">
                            <span class="shard-stat-val" id="stat-total-volume">$0</span>
                            <span class="shard-stat-lbl">24H VOLUME</span>
                        </div>
                        <div class="shard-stat-item">
                            <span class="shard-stat-val" id="stat-opportunities">0</span>
                            <span class="shard-stat-lbl">ALPHA OPS</span>
                        </div>
                        <div class="shard-stat-item">
                            <span class="shard-stat-val" id="stat-max-potential">0x</span>
                            <span class="shard-stat-lbl">MAX ROI</span>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="shard-main" style="flex: 1; min-width: 0;">
                <div class="shard-top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div class="search-box" style="flex: 1; max-width: 380px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="position:absolute; left:12px; top:13px; color:var(--text-3);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-input" placeholder="Search markets by name, category or outcome..." style="width:100%; padding: 10px 12px 10px 36px; background: #0f1219; border: 1px solid #1a1e26; border-radius: 8px; color: var(--text); font-size: 0.85rem; outline: none;">
                    </div>
                    <div class="shard-categories" style="display:flex; gap:8px;">
                        <button class="shard-cat active" data-cat="all">All</button>
                        <button class="shard-cat" data-cat="politics">Politics</button>
                        <button class="shard-cat" data-cat="crypto">Crypto</button>
                        <button class="shard-cat" data-cat="sports">Sports</button>
                        <button class="shard-cat" data-cat="economics">Economics</button>
                    </div>
                </div>

                <div id="markets-grid" class="shard-grid">
                    <!-- Skeletons handled by JS clearing grid.innerHTML -->
                    <div class="skeleton-card" style="height: 200px; background: #0f1219; border-radius: 12px; border: 1px solid #1a1e26;"></div>
                    <div class="skeleton-card" style="height: 200px; background: #0f131a; border-radius: 12px; border: 1px solid #1a1e26;"></div>
                    <div class="skeleton-card" style="height: 200px; background: #0e1219; border-radius: 12px; border: 1px solid #1a1e26;"></div>
                </div>

                <div style="display:flex; justify-content:center; padding: 40px 0;">
                    <button id="load-more-btn" class="shard-btn" style="padding: 10px 32px; font-weight: 700; border-color: var(--blue); color: var(--blue); width: auto;">LOAD MORE DATA</button>
                </div>
            </div>
        </section>

        <!-- ===== WATCHLIST TAB ===== -->
        <section class="tab" id="tab-watchlist">
            <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Your Watchlist</h2>
            <div id="watchlist-grid" class="shard-grid"></div>
            <div id="watchlist-empty" style="display:none; flex-direction:column; align-items:center; justify-content:center; padding: 100px 0; color:var(--text-3);">
                <span style="font-size:3rem; margin-bottom:12px;">☆</span>
                <p>No markets bookmarked yet.</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
