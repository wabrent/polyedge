<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBuilder — Advanced Trading Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="terminal-layout">

    <!-- TOP NAVIGATION: MINIMAL & PRO -->
    <header class="top-nav">
        <div class="nav-brand">
            <div class="cube-logo">P</div>
            <span class="brand-title">POLY<span class="accent">BUILDER</span></span>
            <div class="version-badge">v5.4_ALPHA</div>
        </div>
        
        <div class="nav-stats">
            <div class="stat-unit">
                <span class="u-label">CLOB_LATENCY</span>
                <span class="u-val" id="clob-stat">1.4s</span>
            </div>
            <div class="stat-unit">
                <span class="u-label">GAS_POLYGON</span>
                <span class="u-val text-pos">28 GWEI</span>
            </div>
            <div class="stat-unit">
                <span class="u-label">CONNECTED_NODES</span>
                <span class="u-val">4</span>
            </div>
        </div>

        <div class="user-hub">
            <div class="wallet-wrap glass">
                <span class="mono">$1,240.50</span>
                <div class="online-dot"></div>
            </div>
            <button id="theme-swap" class="icon-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <div class="workspace">
        <!-- LEFT PANEL: INSIDER RADAR -->
        <aside class="panel side-panel left">
            <div class="panel-header">
                <h3>INSIDER_RADAR</h3>
                <span class="badge">LIVE</span>
            </div>
            <div class="trader-list" id="insider-feed">
                <!-- Traders will be injected here -->
            </div>
        </aside>

        <!-- CENTER PANEL: MAIN ACTIVITY STREAM -->
        <main class="panel center-panel">
            <div class="panel-header tab-row">
                <button class="tab-btn active">Markets_Explorer</button>
                <button class="tab-btn">Large_Orders_Feed</button>
                <button class="tab-btn">Yield_Scanner</button>
            </div>
            
            <div class="view-viewport" id="main-viewport">
                <!-- Data Tables / Grid injected here -->
            </div>
        </main>

        <!-- RIGHT PANEL: ENGINEERING & REDEEM -->
        <aside class="panel side-panel right">
            <div class="panel-header">
                <h3>RELAY_CONTROLS</h3>
            </div>
            
            <div class="control-block glass">
                <label class="block-label">BATCH_REDEEMER</label>
                <div class="redeem-sum">
                    <span class="sum-label">Claimable:</span>
                    <span class="sum-val" id="redeem-amount">$412.00</span>
                </div>
                <button class="btn-primary-ghost" id="action-batch">EXECUTE_MERGE_POSITIONS</button>
                <p class="mono-hint">Target: ConditionalTokens.mergePositions()</p>
            </div>

            <div class="control-block glass">
                <label class="block-label">LATENCY_TRACKER</label>
                <div class="latency-chart" id="latency-graph">
                    <!-- Graph bars -->
                </div>
                <div class="latency-meta">
                    <span>P99: <b id="p99-val">4.2s</b></span>
                    <span>Signing: <b class="text-pos">0.4s</b></span>
                </div>
            </div>

            <div class="nav-section mt-auto" style="padding: 16px;">
                <a href="https://builders.polymarket.com" class="builder-cta">
                    REGISTER_PROJECT_VERIFICATION
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
