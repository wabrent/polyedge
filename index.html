<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge | Advanced Analytics</title>
    <!-- Подключаем файл стилей -->
    <link rel="stylesheet" href="styles.css">
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Иконки -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo-area">
            <div class="logo">PolyEdge</div>
            <div class="search-box">
                <i data-lucide="search" size="18"></i>
                <input type="text" placeholder="Search markets...">
            </div>
        </div>
        <div class="nav-actions">
            <button class="btn btn-primary">Connect Wallet</button>
        </div>
    </header>

    <div class="wrapper">
        <aside class="sidebar">
            <nav id="sidebar-nav">
                <!-- Сюда можно добавить ссылки -->
                <a href="#" class="nav-link active"><i data-lucide="layout-grid"></i> Dashboard</a>
                <a href="#" class="nav-link"><i data-lucide="users"></i> Whale Tracker</a>
                <a href="#" class="nav-link"><i data-lucide="trending-up"></i> Market Scan</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Market Intelligence</h1>
            </div>

            <div class="market-grid" id="market-container">
                <!-- Карточки рынков появятся здесь через скрипт -->
            </div>

            <div class="table-card">
                <div class="table-title">Live Whale Activity</div>
                <table>
                    <thead>
                        <tr>
                            <th>Market</th>
                            <th>Action</th>
                            <th>Amount</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="whale-table-body">
                        <!-- Данные подгрузятся из app.js -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Подключаем логику (app) -->
    <script src="app.js"></script>
</body>
</html>
