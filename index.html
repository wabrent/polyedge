<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge — Polymarket Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>PolyEdge</span>
            </div>
            
            <nav class="main-nav">
                <button class="nav-item active" data-tab="dashboard">Markets</button>
                <button class="nav-item" data-tab="watchlist">Watchlist</button>
                <button class="nav-item" data-tab="scanner">Scanner</button>
                <button class="nav-item" data-tab="arbitrage">Arbitrage</button>
                <button class="nav-item" data-tab="simulator">Simulator</button>
            </nav>

            <div class="header-right">
                <div class="refresh-group">
                    <svg width="20" height="20" class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6m12-4a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                    <div class="refresh-timer-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="refresh-progress" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <span id="refresh-text">60s</span>
                    </div>
                </div>
                <button class="theme-toggle" id="theme-toggle">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
                <div class="world-clocks">
                    <div class="clock-item">NYC <span id="clock-nyc">08:36</span></div>
                    <div class="clock-item">LDN <span id="clock-ldn">12:36</span></div>
                    <div class="clock-item">TKO <span id="clock-tko">21:36</span></div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- ===== DASHBOARD ===== -->
        <section class="tab active" id="tab-dashboard">
            <div class="stats-bar">
                <div class="stat"><span class="stat-val" id="stat-total-markets">60</span><span class="stat-lbl">Markets</span></div>
                <div class="stat-divider"></div>
                <div class="stat"><span class="stat-val" id="stat-total-volume">$79.5M</span><span class="stat-lbl">24h Volume</span></div>
                <div class="stat-divider"></div>
                <div class="stat"><span class="stat-val" id="stat-opportunities">52</span><span class="stat-lbl">Opportunities</span></div>
                <div class="stat-divider"></div>
                <div class="stat"><span class="stat-val" id="stat-max-potential">2000x</span><span class="stat-lbl">Best ROI</span></div>
            </div>

            <div class="toolbar">
                <div class="toolbar-left">
                    <h2 class="section-title">Trending Markets</h2>
                    <div class="search-box">
                        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="search-input" class="search-input" placeholder="Search markets...">
                    </div>
                </div>
                <div class="toolbar-controls">
                    <select id="category-filter" class="select-sm">
                        <option value="all">All</option>
                        <option value="politics">Politics</option>
                        <option value="crypto">Crypto</option>
                        <option value="sports">Sports</option>
                    </select>
                    <select id="volume-filter" class="select-sm">
                        <option value="0">Any Volume</option>
                        <option value="10000">> $10k</option>
                        <option value="50000">> $50k</option>
                    </select>
                    <select id="sort-filter" class="select-sm">
                        <option value="volume24hr">Volume 24h</option>
                        <option value="liquidity">Liquidity</option>
                        <option value="potential">Max ROI</option>
                    </select>
                </div>
            </div>

            <div class="markets-grid" id="markets-grid">
                <!-- Data loaded via JS to match the image exactly -->
            </div>

            <div class="load-more-container">
                <button class="btn-load-more" id="load-more-btn">Load more markets</button>
            </div>
        </section>

        <!-- ===== OTHER TABS PLACEHOLDERS ===== -->
        <section class="tab" id="tab-watchlist">
            <h2 class="section-title">Your Watchlist</h2>
            <div class="markets-grid" id="watchlist-grid"></div>
        </section>
        <section class="tab" id="tab-scanner"></section>
        <section class="tab" id="tab-arbitrage"></section>
        <section class="tab" id="tab-simulator"></section>
    </main>

    <script src="app.js"></script>
</body>
</html>
