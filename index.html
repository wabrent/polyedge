<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge | Pro Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen pb-20">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 md:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2 font-black text-xl tracking-tight italic">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="text-blue-600">
                    <path d="M12 2L1 12l11 10 11-10L12 2zm0 18.5L3.5 12 12 5.5 20.5 12 12 20.5z"/>
                </svg>
                PolyEdge
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-gray-500">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 h-16 flex items-center">Markets</a>
                <a href="#" class="hover:text-gray-900 transition">Watchlist</a>
                <a href="#" class="hover:text-gray-900 transition">Scanner</a>
                <a href="#" class="hover:text-gray-900 transition">Arbitrage</a>
                <a href="#" class="hover:text-gray-900 transition">Simulator</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden lg:flex items-center gap-2 px-3 py-1.5 bg-gray-50 rounded-full border border-gray-200">
                <svg width="16" height="16" fill="currentColor" class="text-gray-400"><path d="M12.6,2H11.1L8.4,10H10l0.5-1.7h3L14,10h1.6L12.6,2z M10.9,7.1l1.1-3.6l1,3.6H10.9z M3,10h1.6V6.9h0.1l2.1,3.1h1.5V1.9H6.7v3.1h-0.1L4.5,1.9H3V10z"/></svg>
                <div class="w-6 h-6 rounded-full border-2 border-blue-500 flex items-center justify-center text-[10px] font-bold text-blue-500">2s</div>
                <button class="w-6 h-6 flex items-center justify-center text-gray-400"><svg width="14" height="14" fill="currentColor"><circle cx="7" cy="7" r="3"/><path d="M7,1V0 M7,14v-1 M1,7H0 M14,7h-1 M2.8,2.8L2.1,2.1 M11.9,11.9l-0.7-0.7 M2.8,11.2l-0.7,0.7 M11.9,2.1l-0.7,0.7"/></svg></button>
            </div>
            <div class="flex gap-4 border-l border-gray-200 pl-4 items-center">
                <div class="text-right">
                    <div class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest">NYC</div>
                    <div class="text-[13px] font-black" id="clock-nyc">08:36</div>
                </div>
                <div class="text-right">
                    <div class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest">LDN</div>
                    <div class="text-[13px] font-black" id="clock-ldn">12:36</div>
                </div>
                <div class="text-right">
                    <div class="text-[9px] font-extrabold text-gray-400 uppercase tracking-widest">TKO</div>
                    <div class="text-[13px] font-black" id="clock-tko">21:36</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-10 px-4 md:px-8">
        <!-- HERO STATS -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-markets">60</div>
                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Markets</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-vol">$79.5M</div>
                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">24h Volume</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-opps">52</div>
                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Opportunities</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1">2000x</div>
                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest">Best ROI</div>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <h2 class="text-2xl font-black tracking-tight">Trending Markets</h2>
                <div class="relative flex-1 md:w-64">
                    <input type="text" id="marketSearch" placeholder="Search markets..." 
                           class="w-full bg-gray-100 border border-transparent focus:bg-white focus:border-gray-200 rounded-lg px-3 py-2 text-sm outline-none transition-all">
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="category" class="bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold outline-none">
                    <option value="">All</option>
                </select>
                <select id="vol-filter" class="bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold outline-none">
                    <option value="any">Any Volume</option>
                </select>
                <select id="sort-filter" class="bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold outline-none">
                    <option value="volume">Volume 24h</option>
                </select>
            </div>
        </div>

        <!-- MARKET GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="marketGrid">
            <!-- Dynamic loading -->
            <div class="col-span-full py-20 text-center">
                <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
