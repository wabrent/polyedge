<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge | Pro Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen pb-20 bg-[#F9FAFB]">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 md:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-3 font-black text-xl tracking-tighter italic">
                <!-- EMBEDDED LOGO (SVG version of the 'P' logo) -->
                <div class="w-8 h-8 bg-black flex items-center justify-center rounded-lg shadow-lg">
                    <svg viewBox="0 0 100 100" class="w-5 h-5 text-white fill-current">
                        <path d="M20 20 L80 20 L80 50 L50 50 L50 80 L20 80 Z" />
                    </svg>
                </div>
                PolyEdge
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-bold text-gray-400">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 h-16 flex items-center">Markets</a>
                <a href="#" class="hover:text-gray-900 transition">Watchlist</a>
                <a href="#" class="hover:text-gray-900 transition">Scanner</a>
                <a href="#" class="hover:text-gray-900 transition">Arbitrage</a>
                <a href="#" class="hover:text-gray-900 transition">Simulator</a>
            </nav>
        </div>

        <div class="flex items-center gap-4">
            <div class="hidden lg:flex items-center gap-2 px-3 py-1.5 bg-gray-50 rounded-full border border-gray-200">
                <div class="w-5 h-5 rounded-full border-2 border-blue-500 flex items-center justify-center text-[9px] font-black text-blue-500">2s</div>
                <button class="w-5 h-5 flex items-center justify-center text-gray-400">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
            <div class="flex gap-4 border-l border-gray-100 pl-4 items-center">
                <div class="text-right">
                    <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest">NYC</div>
                    <div class="text-[12px] font-black" id="clock-nyc">00:00</div>
                </div>
                <div class="text-right">
                    <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest">LDN</div>
                    <div class="text-[12px] font-black" id="clock-ldn">00:00</div>
                </div>
                <div class="text-right">
                    <div class="text-[8px] font-black text-gray-400 uppercase tracking-widest">TKO</div>
                    <div class="text-[12px] font-black" id="clock-tko">00:00</div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-10 px-4 md:px-8">
        <!-- HERO STATS -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-markets">60</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Markets</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-vol">$79.5M</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">24h Volume</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1" id="stat-opps">52</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Opportunities</div>
            </div>
            <div class="stat-card">
                <div class="text-3xl font-black mb-1">2000x</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Best ROI</div>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <h2 class="text-2xl font-black tracking-tighter">Trending Markets</h2>
                <div class="relative flex-1 md:w-64">
                    <input type="text" id="marketSearch" placeholder="Search markets..." 
                           class="w-full bg-gray-100 border border-transparent focus:bg-white focus:border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none transition-all font-medium">
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="category" class="bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-[11px] font-black uppercase outline-none cursor-pointer">
                    <option value="">All Categories</option>
                </select>
                <select class="bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-[11px] font-black uppercase outline-none">
                    <option value="any">Any Volume</option>
                </select>
                <select class="bg-gray-100 border border-gray-200 rounded-lg px-4 py-2.5 text-[11px] font-black uppercase outline-none">
                    <option value="vol">Volume 24h</option>
                </select>
            </div>
        </div>

        <!-- MARKET GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="marketGrid">
            <!-- Loading State -->
            <div class="col-span-full py-32 text-center" id="loading-state">
                <div class="inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-xs font-black text-gray-400 uppercase tracking-widest">Syncing Intelligence...</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
