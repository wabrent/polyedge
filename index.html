<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge PRO</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
    <header class="header-node">
        <div class="brand-sector">
            <!-- BLACK SHARP P LOGO -->
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 24px; height: 24px;">
                <path d="M35 30H75C85 30 95 40 95 50C95 60 85 70 75 70H55L45 90L55 70H35L42 50H35L35 30Z" fill="black"/>
            </svg>
            <span class="brand-name">PolyEdge</span>
        </div>
        
        <nav class="nav-sector">
            <div class="nav-item active" data-tab="markets">Markets</div>
            <div class="nav-item" data-tab="terminal">Quant Terminal</div>
            <div class="nav-item" data-tab="scanner">Scanner</div>
            <div class="nav-item" data-tab="arbitrage">Arbitrage</div>
        </nav>

        <div class="header-actions">
            <div class="icon-btn">𝕏</div>
            <div class="update-timer">
                <div class="timer-dot"></div> 2s
            </div>
            <div class="icon-btn">☀️</div>
            
            <div class="time-zone-group">
                <div class="tz-box">
                    <div class="tz-label">NYC</div>
                    <div class="tz-val" id="time-nyc">08:58</div>
                </div>
                <div class="tz-box">
                    <div class="tz-label">LDN</div>
                    <div class="tz-val" id="time-ldn">13:58</div>
                </div>
                <div class="tz-box">
                    <div class="tz-label">TKO</div>
                    <div class="tz-val" id="time-tko">22:58</div>
                </div>
            </div>
        </div>
    </header>

    <section class="stats-bar">
        <div class="stat-box">
            <span class="stat-label">Markets</span>
            <span class="stat-val" id="market-count">60</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">24h Volume</span>
            <span class="stat-val" id="flow-val">$79.5M</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Opportunities</span>
            <span class="stat-val">52</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Best ROI</span>
            <span class="stat-val">2000x</span>
        </div>
    </section>

    <div class="search-sector">
        <h2 class="section-title" id="view-title">Trending Markets</h2>
        <div class="search-wrap">
            <input type="text" class="search-input" id="shardSearch" placeholder="Search markets...">
            <div class="filter-group">
                <select class="filter-select"><option>All</option></select>
                <select class="filter-select"><option>Any Volume</option></select>
                <select class="filter-select"><option>Volume 24h</option></select>
            </div>
        </div>
    </div>

    <main id="shard-grid">
        <!-- DATA -->
    </main>

    <script src="app.js?v=7.2"></script>
</body>
</html>
