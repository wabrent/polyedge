<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyEdge | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        app: {
                            bg: '#0A0E17',
                            panel: '#131823',
                            activeTab: '#1E2433',
                            border: '#1F2937',   
                            text: '#9CA3AF',
                            accent: '#3B82F6',
                            green: '#10B981',
                            red: '#EF4444'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased h-screen flex flex-col overflow-hidden bg-app-bg text-white">

    <header class="h-[60px] flex-shrink-0 border-b border-app-border bg-app-bg flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-7 h-7 bg-white rounded-md flex items-center justify-center">
                    <span class="text-black font-black text-lg" style="clip-path: polygon(0 0, 100% 0, 100% 60%, 50% 100%, 0 60%);">P</span>
                </div>
                <span class="font-bold text-lg tracking-tight">PolyEdge</span>
            </div>
            
            <nav class="hidden md:flex items-center gap-2 text-[15px] font-medium text-app-text" id="main-nav">
                <a href="#" data-target="markets" data-title="Markets" data-subtitle="Active filtering for markets nodes..." 
                   class="nav-link px-4 py-2 rounded-xl bg-app-activeTab text-white transition-colors">Markets</a>
                   
                <a href="#" data-target="watchlist" data-title="Watchlist" data-subtitle="Tracking your high-priority market nodes..." 
                   class="nav-link px-4 py-2 rounded-xl hover:text-white transition-colors">Watchlist</a>
                   
                <a href="#" data-target="scanner" data-title="Opportunity Scanner" data-subtitle="Find high-potential markets based on ROI, liquidity, and time horizon." 
                   class="nav-link px-4 py-2 rounded-xl hover:text-white transition-colors">Scanner</a>
                   
                <a href="#" data-target="arbitrage" data-title="Arbitrage" data-subtitle="Detecting cross-platform odds discrepancies..." 
                   class="nav-link px-4 py-2 rounded-xl hover:text-white transition-colors">Arbitrage</a>
            </nav>
        </div>

        <div class="flex items-center gap-5">
            <div class="relative w-8 h-8">
                <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                    <circle cx="18" cy="18" r="16" fill="none" class="stroke-current text-app-border" stroke-width="2"></circle>
                    <circle cx="18" cy="18" r="16" fill="none" id="refresh-progress" class="stroke-current text-app-accent" stroke-width="2" stroke-dasharray="0 100"></circle>
                </svg>
                <span class="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-app-accent" id="refresh-timer">15s</span>
            </div>
            <div class="flex gap-4 text-[10px] font-mono text-app-text border-l border-app-border pl-5">
                <div class="flex flex-col items-center"><span>NYC</span><span class="font-bold text-white text-[11px]" id="clock-nyc">09:15</span></div>
                <div class="flex flex-col items-center"><span>LDN</span><span class="font-bold text-white text-[11px]" id="clock-ldn">13:15</span></div>
                <div class="flex flex-col items-center"><span>TKO</span><span class="font-bold text-white text-[11px]" id="clock-tko">22:15</span></div>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto px-6 lg:px-10 py-10">
        <div class="max-w-[1200px] mx-auto">
            
            <div class="mb-10 flex justify-between items-end">
                <div>
                    <h1 id="page-title" class="text-3xl font-bold text-white mb-3 tracking-tight">Markets</h1>
                    <p id="page-subtitle" class="text-[15px] text-app-text">Active filtering for markets nodes...</p>
                </div>
                <div id="scanner-controls" class="hidden flex items-end gap-6 pb-2">
                   <div class="w-40">
                        <div class="flex justify-between mb-2"><span class="text-[10px] text-app-text font-bold">MIN ROI</span><span class="text-[10px] text-app-accent font-bold" id="val-roi">5x</span></div>
                        <input type="range" min="1" max="20" value="5" class="slider-accent" id="input-roi">
                   </div>
                   <div class="w-40">
                        <div class="flex justify-between mb-2"><span class="text-[10px] text-app-text font-bold">LIQUIDITY</span><span class="text-[10px] text-app-green font-bold" id="val-liq">$10K</span></div>
                        <input type="range" min="1" max="500" value="10" class="slider-green" id="input-liq">
                   </div>
                </div>
                <div id="search-container" class="pb-2">
                    <input type="text" placeholder="Filter markets..." id="search-input" class="bg-app-panel border border-app-border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-app-accent w-64">
                </div>
            </div>

            <div class="text-[11px] font-bold text-app-text uppercase tracking-widest mb-4 opacity-70" id="target-count">Found 0 targets</div>

            <div id="content-container" class="flex flex-col gap-3">
                <!-- DYNAMIC CONTENT INJECTED HERE -->
                <div class="animate-pulse flex flex-col gap-3">
                    <div class="h-24 bg-app-panel rounded-xl border border-app-border opacity-50"></div>
                    <div class="h-24 bg-app-panel rounded-xl border border-app-border opacity-30"></div>
                    <div class="h-24 bg-app-panel rounded-xl border border-app-border opacity-10"></div>
                </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
